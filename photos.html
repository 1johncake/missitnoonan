<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos — Wedghoods Palm Springs 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:         #2E4A82;
  --navy-dark:    #1C2639;
  --navy-deeper:  #141B2D;
  --navy-mid:     #4A6BAD;
  --navy-light:   #7A96C7;
  --gold:         #C98A2C;
  --gold-bright:  #E0A84A;
  --gold-light:   #EEC97A;
  --gold-dark:    #A86C1A;
  --sage:         #7A9E82;
  --sage-deep:    #4A6E52;
  --cream:        #FAF4EA;
  --ink:          #1A1A2E;
  --white:        #FFFFFF;
  --surface-1:    #141B2D;
  --surface-2:    #1C2639;
  --surface-3:    #253248;
  --surface-4:    #2E3D57;
  --font-display: 'Fraunces', serif;
  --font-body:    'Plus Jakarta Sans', sans-serif;
  --font-mono:    'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--navy-deeper);
  color: var(--white);
  overflow-x: hidden;
  min-height: 100vh;
}
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(28,38,57,0.97);
  backdrop-filter: blur(10px);
  display: flex; flex-direction: column; align-items: center;
  border-bottom: 1px solid rgba(201,138,44,0.25);
}
.nav-top {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.55rem 2rem;
  position: relative;
}
.nav-back {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  text-decoration: none;
  display: flex; align-items: center; gap: 0.4rem;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--gold-bright); }
.nav-logo-text {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 400;
  font-style: italic;
  color: var(--gold-light);
  letter-spacing: 0.06em;
  position: absolute;
  left: 50%; transform: translateX(-50%);
}
.nav-count {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.1em;
}
.page-hero {
  padding: 96px 2rem 3rem;
  text-align: center;
  background: linear-gradient(180deg, var(--surface-2) 0%, var(--navy-deeper) 100%);
  border-bottom: 1px solid rgba(201,138,44,0.12);
}
.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.75rem;
}
.page-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 300;
  font-style: italic;
  color: var(--gold-light);
  line-height: 1.15;
  margin-bottom: 0.5rem;
}
.page-sub {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.06em;
  margin-top: 0.75rem;
}
.page-rule {
  width: 48px; height: 1px;
  background: var(--gold-dark);
  margin: 1.25rem auto 0;
}
.gallery-wrap {
  max-width: 1300px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 6rem;
}
.gallery-grid {
  columns: 3;
  column-gap: 1rem;
}
@media (max-width: 900px) { .gallery-grid { columns: 2; } }
@media (max-width: 500px) { .gallery-grid { columns: 1; } }
.gallery-item {
  break-inside: avoid;
  margin-bottom: 1rem;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  border-radius: 3px;
  border: 1px solid rgba(201,138,44,0.1);
  background: var(--surface-3);
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s ease, border-color 0.2s, box-shadow 0.2s;
}
.gallery-item.visible { opacity: 1; transform: translateY(0); }
.gallery-item:hover {
  border-color: rgba(201,138,44,0.35);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.gallery-item img {
  width: 100%; height: auto; display: block;
  transition: transform 0.4s ease;
}
.gallery-item:hover img { transform: scale(1.04); }
.gallery-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(20,27,45,0.65) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s;
  display: flex; align-items: flex-end;
  padding: 0.75rem;
}
.gallery-item:hover .gallery-overlay { opacity: 1; }
.overlay-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold-bright);
}
.gallery-state {
  text-align: center;
  padding: 4rem 2rem;
  color: rgba(255,255,255,0.25);
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
}
.gallery-state .state-sub {
  font-family: var(--font-body);
  font-style: normal;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  margin-top: 0.5rem;
  color: rgba(255,255,255,0.15);
  text-transform: uppercase;
}
.lightbox {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,14,26,0.97);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox-inner {
  position: relative;
  max-width: min(92vw, 1100px);
  max-height: 90vh;
  display: flex; align-items: center; justify-content: center;
}
.lightbox img {
  max-width: 100%; max-height: 88vh;
  object-fit: contain;
  border-radius: 2px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.8);
  border: 1px solid rgba(201,138,44,0.15);
}
.lightbox-close {
  position: fixed; top: 1.25rem; right: 1.5rem;
  background: none;
  border: 1px solid rgba(201,138,44,0.3);
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}
.lightbox-close:hover {
  background: rgba(201,138,44,0.12);
  color: var(--gold-bright);
  border-color: var(--gold);
}
.lightbox-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(28,38,57,0.8);
  border: 1px solid rgba(201,138,44,0.2);
  color: var(--gold);
  width: 44px; height: 44px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.lightbox-nav:hover {
  background: rgba(201,138,44,0.15);
  color: var(--gold-bright);
  border-color: var(--gold);
}
.lightbox-prev { left: 1.25rem; }
.lightbox-next { right: 1.25rem; }
.lightbox-counter {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.3);
}
footer {
  text-align: center;
  padding: 2rem;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.15);
  border-top: 1px solid rgba(201,138,44,0.08);
}
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <a href="/wedghood2026.html" class="nav-back">&#8592; Back</a>
    <div class="nav-logo-text">Palm Springs 2026</div>
    <div class="nav-count" id="nav-count">&nbsp;</div>
  </div>
</nav>

<div class="page-hero">
  <div class="page-eyebrow">Wedghoods &middot; Palm Springs &middot; April 30 &ndash; May 3</div>
  <div class="page-title">From the Fairway</div>
  <div class="page-rule"></div>
  <div class="page-sub">Anyone in the crew can add photos &mdash; just drop them in the shared Drive folder.</div>
</div>

<div class="gallery-wrap">
  <div class="gallery-grid" id="gallery-grid">
    <div class="gallery-state" id="gallery-state">
      Loading photos&hellip;
      <div class="state-sub">Fetching from Drive</div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightboxBg(event)">
  <div class="lightbox-inner">
    <img id="lightbox-img" src="" alt="">
  </div>
  <button class="lightbox-close" onclick="closeLightbox()">Close</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1, event)">&#8592;</button>
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1, event)">&#8594;</button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<footer>Well&hellip; we&rsquo;re waiting.</footer>

<script>
const PHOTOS_URL = 'https://script.google.com/macros/s/AKfycbxDvxbAEZ-uKjaaE9XgN8bHtD2ZT8wnRJZtLDnQRJ7rvLZEm2pyuBR8oi8QdHDETP7B3g/exec';

let photos = [];
let currentIndex = 0;

async function loadPhotos() {
  try {
    const res = await fetch(PHOTOS_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    photos = await res.json();

    const grid = document.getElementById('gallery-grid');
    const state = document.getElementById('gallery-state');

    if (!photos.length) {
      state.innerHTML = 'No photos yet.'
        + '<div class="state-sub">Drop some into the shared Drive folder</div>';
      return;
    }

    state.remove();
    document.getElementById('nav-count').textContent = photos.length + ' photo' + (photos.length !== 1 ? 's' : '');

    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = '<img src="' + photo.thumb + '" alt="' + photo.name + '" loading="lazy">'
        + '<div class="gallery-overlay"><span class="overlay-label">View</span></div>';
      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
      setTimeout(() => item.classList.add('visible'), 60 + i * 50);
    });

  } catch(e) {
    document.getElementById('gallery-state').innerHTML =
      'Could not load photos.'
      + '<div class="state-sub">' + e.message + '</div>';
  }
}

function openLightbox(index) {
  currentIndex = index;
  document.getElementById('lightbox-img').src = photos[index].url;
  document.getElementById('lightbox-counter').textContent = (index + 1) + ' / ' + photos.length;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}

function closeLightboxBg(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function navLightbox(dir, e) {
  if (e) e.stopPropagation();
  currentIndex = (currentIndex + dir + photos.length) % photos.length;
  document.getElementById('lightbox-img').src = photos[currentIndex].url;
  document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + photos.length;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 'ArrowLeft')  navLightbox(-1);
  if (e.key === 'Escape')     closeLightbox();
});

loadPhotos();
</script>
</body>
</html>
