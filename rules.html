<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rules Cheat Sheet — missitnoonan.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #1e1f24;
      --bg-card:  #2e3038;
      --carolina: #4B9CD3;
      --white:    #f4f8fc;
      --muted:    #888fa0;
      --rule:     rgba(75,156,211,0.2);
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--white); overflow: hidden; }
    .top-stripe {
      position: fixed; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(to right, transparent, var(--carolina) 25%, #7dbfe8 50%, var(--carolina) 75%, transparent);
      z-index: 20;
    }
    .page {
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 0;
    }
    .back {
      position: fixed; top: 1.4rem; left: 2rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(75,156,211,0.5); text-decoration: none;
      transition: color 0.2s ease;
    }
    .back:hover { color: var(--carolina); }

    .icon {
      font-size: 2.5rem;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
      animation-delay: 0.2s;
    }
    .eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--carolina); opacity: 0;
      animation: fadeUp 0.7s ease forwards; animation-delay: 0.3s;
      margin-bottom: 0.8rem;
    }
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700;
      color: var(--white); line-height: 1.1;
      opacity: 0; animation: fadeUp 0.7s ease forwards; animation-delay: 0.4s;
      margin-bottom: 1.4rem;
    }
    .headline em { font-style: italic; color: var(--carolina); }
    .divider {
      width: 40px; height: 1px;
      background: linear-gradient(to right, transparent, var(--carolina), transparent);
      margin: 0 auto 1.4rem;
      opacity: 0; animation: fadeUp 0.7s ease forwards; animation-delay: 0.5s;
    }
    .desc {
      font-size: 0.9rem; color: var(--muted); line-height: 1.7;
      max-width: 360px; margin: 0 auto 2rem;
      opacity: 0; animation: fadeUp 0.7s ease forwards; animation-delay: 0.6s;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      background: rgba(75,156,211,0.08); border: 1px solid rgba(75,156,211,0.2);
      color: var(--muted); border-radius: 20px; padding: 0.4rem 1rem;
      opacity: 0; animation: fadeUp 0.7s ease forwards; animation-delay: 0.7s;
    }
    .footer-line {
      position: fixed; bottom: 1.5rem; left: 0; right: 0;
      text-align: center;
      font-family: 'Courier Prime', monospace;
      font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      opacity: 0; animation: fadeIn 1s ease forwards; animation-delay: 1s;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @media (max-width: 480px) { html, body { overflow: auto; } }
  </style>
</head>
<body>
  <div class="top-stripe"></div>
  <a href="/" class="back">← missitnoonan.com</a>
  <div class="page">
    <div class="icon">📋</div>
    <span class="eyebrow">Rules Cheat Sheet</span>
    <h1 class="headline">Under <em>construction.</em></h1>
    <div class="divider"></div>
    <p class="desc">A quick-reference guide to the rules you actually need on the course. Coming soon — probably before someone tries to claim a drop they don't deserve.</p>
    <span class="pill">🚧 &nbsp; Coming soon</span>
  </div>
  <div class="footer-line">© 2026 missitnoonan.com</div>
</body>
</html>
